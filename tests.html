<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tests Interactivos - Estadistica</title>
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 0; }

        .test-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 24px 60px;
            min-height: 100vh;
        }

        .back-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .back-bar a {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--blue);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .theory-link {
            font-size: 0.8rem;
            color: var(--text-dim);
            padding: 5px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition: all 0.15s;
        }
        .theory-link:hover {
            border-color: var(--teal);
            color: var(--teal);
        }

        .test-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .test-header h1 {
            color: var(--blue);
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            margin-bottom: 6px;
        }

        .test-header p {
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        /* Tabs */
        .tema-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 28px;
            border-bottom: 1px solid var(--border);
        }

        .tema-tab {
            flex: 1;
            padding: 12px 8px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--text-dim);
            font-size: 0.9rem;
            font-family: var(--font-body);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .tema-tab:hover { color: var(--blue); }

        .tema-tab.active {
            color: var(--blue);
            border-bottom-color: var(--blue);
        }

        .tema-tab .tab-label {
            display: block;
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-top: 2px;
            font-weight: 400;
        }

        .tema-tab.active .tab-label { color: var(--blue-bright); opacity: 0.7; }

        /* Progress */
        .quiz-progress {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }

        .quiz-progress-text {
            color: var(--text-dim);
            font-size: 0.85rem;
            min-width: 100px;
            font-variant-numeric: tabular-nums;
        }

        .quiz-progress-bar {
            flex: 1;
            height: 3px;
            background: var(--surface-2);
            border-radius: 2px;
            overflow: hidden;
        }

        .quiz-progress-fill {
            height: 100%;
            background: var(--blue);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Question Card */
        .q-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 36px 32px;
            margin-bottom: 24px;
            min-height: 260px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .q-number {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--blue);
            margin-bottom: 16px;
            font-family: var(--font-body);
        }

        .q-text {
            font-family: var(--font-display);
            font-size: 1.25rem;
            line-height: 1.9;
            color: var(--text-bright);
            margin-bottom: 28px;
        }

        .q-answer-section { margin-top: auto; }

        .reveal-btn {
            padding: 10px 24px;
            background: var(--blue);
            border: 2px solid var(--blue);
            color: var(--bg);
            font-size: 0.9rem;
            font-weight: 600;
            font-family: var(--font-body);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 16px;
        }

        .reveal-btn:hover {
            background: var(--blue-bright);
            border-color: var(--blue-bright);
        }

        .reveal-btn.open {
            background: transparent;
            color: var(--blue);
        }

        .q-answer {
            background: var(--blue-dim);
            border-left: 3px solid var(--blue);
            padding: 20px 24px;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            line-height: 1.9;
            color: var(--text);
            display: none;
        }

        .q-answer.visible {
            display: block;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Navigation */
        .q-nav {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }

        .q-nav-btn {
            padding: 10px 24px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--blue);
            font-size: 0.9rem;
            font-weight: 500;
            font-family: var(--font-body);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s;
        }

        .q-nav-btn:hover:not(:disabled) {
            background: var(--surface-2);
            border-color: var(--blue);
        }

        .q-nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Completion */
        .done-screen {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 48px 32px;
            text-align: center;
            display: none;
        }

        .done-screen.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .done-screen h2 {
            color: var(--blue);
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .done-screen p {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-bottom: 24px;
        }

        .done-score {
            font-family: var(--font-display);
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--green);
            margin: 20px 0;
        }

        .done-links {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .done-links a {
            padding: 10px 24px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .done-links .btn-primary {
            background: var(--blue);
            color: var(--bg);
        }
        .done-links .btn-primary:hover { background: var(--blue-bright); }

        .done-links .btn-secondary {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .done-links .btn-secondary:hover { border-color: var(--blue); color: var(--blue); }

        @media (max-width: 600px) {
            .test-page { padding: 20px 14px 40px; }
            .q-card { padding: 24px 18px; }
            .q-text { font-size: 1.1rem; }
            .q-nav { flex-direction: column; }
            .q-nav-btn { width: 100%; }
            .done-links { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="test-page">

    <div class="back-bar">
        <a href="index.html">&#8592; Volver a la teoria</a>
        <a href="#" class="theory-link" id="theory-link">Repasar teoria del tema &#8594;</a>
    </div>

    <div class="test-header">
        <h1>Tests Interactivos</h1>
        <p>Comprueba si dominas cada tema antes del examen</p>
    </div>

    <div class="tema-tabs">
        <button class="tema-tab active" data-tema="1">
            Tema 1
            <span class="tab-label">Probabilidad</span>
        </button>
        <button class="tema-tab" data-tema="2">
            Tema 2
            <span class="tab-label">Binomial</span>
        </button>
        <button class="tema-tab" data-tema="3">
            Tema 3
            <span class="tab-label">Normal e IC</span>
        </button>
    </div>

    <div class="quiz-progress">
        <span class="quiz-progress-text" id="progress-text">Pregunta 1 / 5</span>
        <div class="quiz-progress-bar">
            <div class="quiz-progress-fill" id="progress-fill"></div>
        </div>
    </div>

    <div id="quiz-content">
        <div class="q-card">
            <div>
                <div class="q-number" id="q-number">Pregunta 1</div>
                <div class="q-text" id="q-text"></div>
            </div>
            <div class="q-answer-section">
                <button class="reveal-btn" id="reveal-btn" onclick="toggleAnswer()">
                    Mostrar respuesta
                </button>
                <div class="q-answer" id="q-answer"></div>
            </div>
        </div>
    </div>

    <div class="done-screen" id="done-screen">
        <h2>Test completado</h2>
        <p>Has repasado todas las preguntas de este tema.</p>
        <div class="done-score" id="done-score"></div>
        <div class="done-links">
            <a href="#" class="btn-secondary" id="done-theory">Repasar teoria</a>
            <a href="index.html" class="btn-primary">Volver al temario</a>
        </div>
    </div>

    <div class="q-nav" id="q-nav">
        <button class="q-nav-btn" id="prev-btn" onclick="prevQuestion()">&#8592; Anterior</button>
        <button class="q-nav-btn" id="next-btn" onclick="nextQuestion()">Siguiente &#8594;</button>
    </div>

</div>

<script>
const questions = {
    1: [
        {
            question: "Si $P(A)=0{,}4$ y $P(B)=0{,}3$ y A y B son independientes, ¿cuanto vale $P(A \\cap B)$?",
            answer: "<strong>Paso 1:</strong> Como son independientes, se cumple que $P(A \\cap B) = P(A) \\cdot P(B)$.<br><br><strong>Paso 2:</strong> Sustituimos: $P(A \\cap B) = 0{,}4 \\times 0{,}3 = 0{,}12$.<br><br><strong>Clave:</strong> Independientes significa que uno no afecta al otro, por eso se multiplican directamente."
        },
        {
            question: "$P(A)=0{,}5$, $P(B)=0{,}6$, $P(A \\cap B)=0{,}2$. Calcula $P(A \\cup B)$.",
            answer: "<strong>Formula:</strong> $P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$<br><br><strong>Sustituimos:</strong> $P(A \\cup B) = 0{,}5 + 0{,}6 - 0{,}2 = 0{,}9$<br><br><strong>Por que se resta?</strong> Porque la interseccion esta incluida tanto en A como en B, y si no la restamos la contamos dos veces."
        },
        {
            question: "$P(A \\cup B)=0{,}8$. ¿Cuanto vale $P(\\bar{A} \\cap \\bar{B})$? (ni A ni B)",
            answer: "<strong>Leyes de De Morgan:</strong> \"ni A ni B\" es el complementario de \"A o B\".<br><br>$P(\\bar{A} \\cap \\bar{B}) = 1 - P(A \\cup B) = 1 - 0{,}8 = 0{,}2$<br><br><strong>Truco:</strong> Siempre que veas \"ni ... ni ...\", piensa en $1 - P(\\text{union})$."
        },
        {
            question: "$P(A)=0{,}3$, $P(A \\cap B)=0{,}15$, $P(B)=0{,}5$. Calcula $P(A|B)$ y di si son independientes.",
            answer: "<strong>Paso 1 - Condicionada:</strong><br>$P(A|B) = \\frac{P(A \\cap B)}{P(B)} = \\frac{0{,}15}{0{,}5} = 0{,}3$<br><br><strong>Paso 2 - Independencia:</strong><br>Comprobamos si $P(A) \\cdot P(B) = P(A \\cap B)$:<br>$0{,}3 \\times 0{,}5 = 0{,}15 = P(A \\cap B)$ &#10003;<br><br><strong>Si, son independientes.</strong> Fijate que $P(A|B) = P(A) = 0{,}3$, lo cual confirma que saber B no cambia la probabilidad de A."
        },
        {
            question: "El 60% compra online y el 40% en tienda. Online devuelve el 10%, tienda el 5%. Un cliente devuelve. ¿Probabilidad de que comprara online?",
            answer: "<strong>Paso 1 - Identificar datos:</strong><br>$P(O) = 0{,}6$, $P(T) = 0{,}4$<br>$P(D|O) = 0{,}10$, $P(D|T) = 0{,}05$<br><br><strong>Paso 2 - Prob. total (P de devolver):</strong><br>$P(D) = P(O) \\cdot P(D|O) + P(T) \\cdot P(D|T)$<br>$= 0{,}6 \\times 0{,}10 + 0{,}4 \\times 0{,}05 = 0{,}06 + 0{,}02 = 0{,}08$<br><br><strong>Paso 3 - Bayes (invertir):</strong><br>$P(O|D) = \\frac{P(O) \\cdot P(D|O)}{P(D)} = \\frac{0{,}06}{0{,}08} = 0{,}75$<br><br><strong>Interpretacion:</strong> Si alguien devuelve, hay un 75% de probabilidad de que comprara online."
        },
        {
            question: "$P(A)=0{,}7$, $P(B)=0{,}6$, $P(A \\cup B)=0{,}9$. Calcula $P(A \\cap B)$ y $P(A|B)$.",
            answer: "<strong>Paso 1 - Despejar interseccion:</strong><br>De $P(A \\cup B) = P(A) + P(B) - P(A \\cap B)$ despejamos:<br>$P(A \\cap B) = P(A) + P(B) - P(A \\cup B) = 0{,}7 + 0{,}6 - 0{,}9 = 0{,}4$<br><br><strong>Paso 2 - Condicionada:</strong><br>$P(A|B) = \\frac{P(A \\cap B)}{P(B)} = \\frac{0{,}4}{0{,}6} = 0{,}667$<br><br><strong>Truco:</strong> En muchos ejercicios te dan la union y tienes que despejar la interseccion. Es la misma formula pero al reves."
        },
        {
            question: "Una fabrica tiene 3 maquinas: M1 (45%), M2 (30%), M3 (25%). Defectos: M1 el 3%, M2 el 4%, M3 el 5%. Se saca una pieza defectuosa. ¿De que maquina viene probablemente?",
            answer: "<strong>Paso 1 - Prob. total:</strong><br>$P(D) = 0{,}45 \\times 0{,}03 + 0{,}30 \\times 0{,}04 + 0{,}25 \\times 0{,}05$<br>$= 0{,}0135 + 0{,}012 + 0{,}0125 = 0{,}038$<br><br><strong>Paso 2 - Bayes para cada maquina:</strong><br>$P(M1|D) = \\frac{0{,}0135}{0{,}038} = 0{,}355$<br>$P(M2|D) = \\frac{0{,}012}{0{,}038} = 0{,}316$<br>$P(M3|D) = \\frac{0{,}0125}{0{,}038} = 0{,}329$<br><br><strong>Viene de M1</strong> (35,5%), aunque M3 tiene mayor tasa de defectos, M1 produce mas piezas."
        },
        {
            question: "¿Son lo mismo sucesos incompatibles e independientes? Razona con un ejemplo.",
            answer: "<strong>NO son lo mismo. Son conceptos distintos.</strong><br><br><strong>Incompatibles:</strong> $P(A \\cap B) = 0$ (no pueden pasar a la vez).<br>Ejemplo: sacar par e impar en un dado.<br><br><strong>Independientes:</strong> $P(A \\cap B) = P(A) \\cdot P(B)$ (uno no afecta al otro).<br>Ejemplo: lanzar un dado y una moneda.<br><br><strong>Atencion:</strong> Si dos sucesos son incompatibles y tienen probabilidad > 0, NO pueden ser independientes (porque $P(A) \\cdot P(B) > 0$ pero $P(A \\cap B) = 0$)."
        },
        {
            question: "En una clase, 300 saben ingles, 100 saben ruso, 50 saben ambos (de 1000). ¿Son independientes \"saber ingles\" y \"saber ruso\"?",
            answer: "<strong>Paso 1 - Calcular probabilidades:</strong><br>$P(I) = 300/1000 = 0{,}3$<br>$P(R) = 100/1000 = 0{,}1$<br>$P(I \\cap R) = 50/1000 = 0{,}05$<br><br><strong>Paso 2 - Comprobar independencia:</strong><br>$P(I) \\cdot P(R) = 0{,}3 \\times 0{,}1 = 0{,}03$<br>$P(I \\cap R) = 0{,}05 \\neq 0{,}03$<br><br><strong>No son independientes.</strong> Hay mas gente que sabe ambos idiomas de lo que cabria esperar si fueran independientes."
        },
        {
            question: "$P(A)=0{,}4$, $P(B)=0{,}5$, $P(A \\cap B)=0{,}1$. Calcula $P(\\bar{A} \\cup \\bar{B})$.",
            answer: "<strong>Usamos De Morgan:</strong> $\\overline{A \\cap B} = \\bar{A} \\cup \\bar{B}$<br><br>Por tanto: $P(\\bar{A} \\cup \\bar{B}) = P(\\overline{A \\cap B}) = 1 - P(A \\cap B) = 1 - 0{,}1 = 0{,}9$<br><br><strong>Significado:</strong> La probabilidad de que NO ocurran A y B a la vez es 0,9."
        }
    ],
    2: [
        {
            question: "$X \\sim B(8,\\; 0{,}3)$. Calcula la media y la desviacion tipica.",
            answer: "<strong>Formulas de la Binomial:</strong><br>$\\mu = n \\cdot p = 8 \\times 0{,}3 = 2{,}4$<br><br>$\\sigma = \\sqrt{n \\cdot p \\cdot q} = \\sqrt{8 \\times 0{,}3 \\times 0{,}7} = \\sqrt{1{,}68} \\approx 1{,}30$<br><br><strong>Interpretacion:</strong> De media esperamos 2,4 exitos en 8 intentos. La mayoria de veces saldran entre 1 y 4 exitos (media $\\pm$ desviacion)."
        },
        {
            question: "Lanzo un dado 5 veces. Exito = sacar 6. Calcula $P(\\text{exactamente dos 6})$.",
            answer: "<strong>Paso 1 - Identificar:</strong> $X \\sim B(5,\\; 1/6)$ porque $n=5$ lanzamientos, $p=1/6$.<br><br><strong>Paso 2 - Formula:</strong><br>$P(X=2) = \\binom{5}{2} \\cdot \\left(\\frac{1}{6}\\right)^2 \\cdot \\left(\\frac{5}{6}\\right)^3$<br><br><strong>Paso 3 - Calcular:</strong><br>$\\binom{5}{2} = 10$ (formas de elegir en que 2 lanzamientos sale 6)<br>$= 10 \\times \\frac{1}{36} \\times \\frac{125}{216} = 10 \\times 0{,}01608 \\approx 0{,}1608$"
        },
        {
            question: "$X \\sim B(10,\\; 0{,}2)$. Calcula $P(X \\geq 1)$.",
            answer: "<strong>Truco del complementario:</strong> \"Al menos 1\" es mas facil calcularlo como \"1 menos la probabilidad de ninguno\".<br><br>$P(X \\geq 1) = 1 - P(X = 0)$<br><br>$P(X=0) = \\binom{10}{0} \\cdot 0{,}2^0 \\cdot 0{,}8^{10} = 1 \\cdot 1 \\cdot 0{,}8^{10} = 0{,}1074$<br><br>$P(X \\geq 1) = 1 - 0{,}1074 = 0{,}8926$<br><br><strong>Regla:</strong> Siempre que veas \"al menos\", usa el complementario."
        },
        {
            question: "El 40% aprueba. 20 estudiantes al azar. ¿Cuantos se espera que aprueben? ¿Que $n$ necesitamos para esperar 30 aprobados?",
            answer: "<strong>Parte 1:</strong> $\\mu = n \\cdot p = 20 \\times 0{,}4 = 8$ aprobados esperados.<br><br><strong>Parte 2:</strong> Queremos $\\mu \\geq 30$:<br>$n \\cdot p \\geq 30$<br>$n \\times 0{,}4 \\geq 30$<br>$n \\geq 30 / 0{,}4 = 75$<br><br><strong>Necesitamos al menos 75 estudiantes.</strong>"
        },
        {
            question: "Un tirador acierta el 80% de los disparos. Hace 3 disparos. ¿Prob. de acertar al menos uno?",
            answer: "<strong>Paso 1:</strong> $X \\sim B(3,\\; 0{,}8)$. Queremos $P(X \\geq 1)$.<br><br><strong>Paso 2 - Complementario:</strong><br>$P(X \\geq 1) = 1 - P(X = 0) = 1 - 0{,}2^3 = 1 - 0{,}008 = 0{,}992$<br><br><strong>Interpretacion:</strong> Es casi seguro (99,2%) que acierte al menos una vez."
        },
        {
            question: "$X \\sim B(6,\\; 0{,}5)$. Calcula $P(X = 3)$ y explica que significa.",
            answer: "<strong>Paso 1:</strong> $P(X=3) = \\binom{6}{3} \\cdot 0{,}5^3 \\cdot 0{,}5^3 = 20 \\times 0{,}125 \\times 0{,}125 = 20 \\times 0{,}015625 = 0{,}3125$<br><br><strong>Significado:</strong> Si lanzas una moneda 6 veces, la probabilidad de obtener exactamente 3 caras es del 31,25%. Es el resultado mas probable porque $p = 0{,}5$."
        },
        {
            question: "Un examen tipo test tiene 10 preguntas con 4 opciones cada una. Si contestas al azar, ¿prob. de acertar 5 o mas?",
            answer: "<strong>Datos:</strong> $X \\sim B(10,\\; 0{,}25)$ porque cada pregunta tiene 1/4 de probabilidad.<br><br><strong>Necesitamos:</strong> $P(X \\geq 5) = 1 - P(X \\leq 4)$<br><br>Calculando cada termino (o con calculadora):<br>$P(X \\leq 4) \\approx 0{,}9219$<br><br>$P(X \\geq 5) = 1 - 0{,}9219 = 0{,}0781$<br><br><strong>Solo un 7,8% de probabilidad.</strong> Contestar al azar no funciona."
        },
        {
            question: "¿Cuando se usa el complementario en la binomial? Pon un ejemplo.",
            answer: "<strong>Se usa cuando piden:</strong><br>- \"Al menos 1\": $P(X \\geq 1) = 1 - P(X=0)$<br>- \"Al menos k\": $P(X \\geq k) = 1 - P(X \\leq k-1)$<br>- \"Mas de k\": $P(X > k) = 1 - P(X \\leq k)$<br><br><strong>Ejemplo:</strong> Si $X \\sim B(5, 0{,}3)$ y piden $P(X \\geq 3)$:<br>Es mas facil calcular $P(X=0)+P(X=1)+P(X=2)$ y restar de 1, que calcular $P(X=3)+P(X=4)+P(X=5)$."
        }
    ],
    3: [
        {
            question: "$X \\sim N(100,\\; 15)$. Tipifica $x=130$ y explica que significa.",
            answer: "<strong>Formula de tipificacion:</strong> $Z = \\frac{X - \\mu}{\\sigma} = \\frac{130 - 100}{15} = \\frac{30}{15} = 2$<br><br><strong>Significado:</strong> El valor 130 esta a 2 desviaciones tipicas por encima de la media. Buscando en la tabla: $P(Z \\leq 2) = 0{,}9772$, asi que el 97,72% de los valores son menores que 130."
        },
        {
            question: "Si $P(Z \\leq 1{,}96) = 0{,}975$, calcula $P(Z \\geq 1{,}96)$ y $P(Z \\leq -1{,}96)$.",
            answer: "<strong>Complementario:</strong> $P(Z \\geq 1{,}96) = 1 - P(Z \\leq 1{,}96) = 1 - 0{,}975 = 0{,}025$<br><br><strong>Simetria:</strong> $P(Z \\leq -1{,}96) = P(Z \\geq 1{,}96) = 0{,}025$<br><br><strong>Por que?</strong> La campana de Gauss es simetrica respecto a 0. Lo que queda a la derecha de 1,96 es lo mismo que queda a la izquierda de -1,96."
        },
        {
            question: "$X \\sim B(200,\\; 0{,}3)$. ¿Se puede aproximar por normal? ¿Con que parametros?",
            answer: "<strong>Paso 1 - Comprobar condiciones:</strong><br>$np = 200 \\times 0{,}3 = 60 \\geq 5$ &#10003;<br>$nq = 200 \\times 0{,}7 = 140 \\geq 5$ &#10003;<br><br><strong>Paso 2 - Calcular parametros:</strong><br>$\\mu = np = 60$<br>$\\sigma = \\sqrt{npq} = \\sqrt{200 \\times 0{,}3 \\times 0{,}7} = \\sqrt{42} \\approx 6{,}48$<br><br>$X \\approx N(60;\\; 6{,}48)$<br><br><strong>Importante:</strong> SIEMPRE hay que escribir que se comprueban las condiciones antes de aproximar."
        },
        {
            question: "Poblacion $\\mu=50$, $\\sigma=10$, muestra $n=100$. ¿Distribucion de la media muestral?",
            answer: "<strong>Teorema Central del Limite:</strong><br>$\\bar{X} \\sim N\\left(\\mu,\\; \\frac{\\sigma}{\\sqrt{n}}\\right) = N\\left(50,\\; \\frac{10}{\\sqrt{100}}\\right) = N(50;\\; 1)$<br><br><strong>Atencion:</strong> La desviacion se divide entre $\\sqrt{n}$, NO entre $n$. Con $n=100$, la desviacion pasa de 10 a 1: 10 veces menor.<br><br><strong>Error comun:</strong> Confundir $\\sigma$ (individuo) con $\\sigma/\\sqrt{n}$ (muestra). Si te preguntan por UN individuo, usas $\\sigma$. Si por la MEDIA de una muestra, usas $\\sigma/\\sqrt{n}$."
        },
        {
            question: "$\\bar{x}=75$, $\\sigma=12$, $n=36$. IC al 95%. Interpretalo.",
            answer: "<strong>Paso 1 - Identificar z:</strong> Confianza 95% $\\Rightarrow z_{\\alpha/2} = 1{,}96$<br><br><strong>Paso 2 - Error:</strong><br>$E = z_{\\alpha/2} \\cdot \\frac{\\sigma}{\\sqrt{n}} = 1{,}96 \\times \\frac{12}{\\sqrt{36}} = 1{,}96 \\times 2 = 3{,}92$<br><br><strong>Paso 3 - Intervalo:</strong><br>$IC = (75 - 3{,}92;\\; 75 + 3{,}92) = (71{,}08;\\; 78{,}92)$<br><br><strong>Interpretacion:</strong> Con un 95% de confianza, la media real de la poblacion esta entre 71,08 y 78,92."
        },
        {
            question: "400 encuestados, 120 dicen si. Calcula $\\hat{p}$ y el IC al 95%.",
            answer: "<strong>Paso 1:</strong> $\\hat{p} = 120/400 = 0{,}3$, $\\hat{q} = 0{,}7$<br><br><strong>Paso 2 - Error:</strong><br>$E = 1{,}96 \\times \\sqrt{\\frac{\\hat{p} \\cdot \\hat{q}}{n}} = 1{,}96 \\times \\sqrt{\\frac{0{,}3 \\times 0{,}7}{400}} = 1{,}96 \\times 0{,}0229 = 0{,}045$<br><br><strong>Paso 3:</strong> $IC = (0{,}3 - 0{,}045;\\; 0{,}3 + 0{,}045) = (0{,}255;\\; 0{,}345)$<br><br><strong>Interpretacion:</strong> Entre el 25,5% y el 34,5% de la poblacion diria que si."
        },
        {
            question: "Bolsas de azucar: $\\mu=500$g, $\\sigma=35$g. Cajas de $n=100$. ¿P(media de la caja < 495g)?",
            answer: "<strong>Paso 1 - Distribucion muestral:</strong><br>$\\bar{X} \\sim N\\left(500,\\; \\frac{35}{\\sqrt{100}}\\right) = N(500;\\; 3{,}5)$<br><br><strong>Paso 2 - Tipificar:</strong><br>$Z = \\frac{495 - 500}{3{,}5} = \\frac{-5}{3{,}5} = -1{,}43$<br><br><strong>Paso 3 - Tabla:</strong><br>$P(Z < -1{,}43) = 1 - P(Z < 1{,}43) = 1 - 0{,}9236 = 0{,}0764$<br><br><strong>El 7,6%</strong> de las cajas tendran peso medio inferior a 495g."
        },
        {
            question: "Soldados con estatura $N(173, 6)$. a) P(uno mida < 175). b) Muestra de 12: P(media > 176).",
            answer: "<strong>a) INDIVIDUO</strong> (se usa $\\sigma = 6$):<br>$Z = \\frac{175-173}{6} = 0{,}33 \\Rightarrow P(Z < 0{,}33) = 0{,}6293$<br><br><strong>b) MUESTRA</strong> (se usa $\\sigma/\\sqrt{n} = 6/\\sqrt{12} = 1{,}73$):<br>$Z = \\frac{176-173}{1{,}73} = 1{,}73 \\Rightarrow P(Z > 1{,}73) = 1 - 0{,}9582 = 0{,}0418$<br><br><strong>CLAVE del examen:</strong> Distinguir si preguntan por UN individuo ($\\sigma$) o por la MEDIA de una muestra ($\\sigma/\\sqrt{n}$). Es el error mas comun."
        },
        {
            question: "¿Que tamano de muestra necesitamos para estimar una proporcion con error < 3% y confianza 95,5%?",
            answer: "<strong>Paso 1 - Datos:</strong> $E = 0{,}03$, $1-\\alpha = 0{,}955 \\Rightarrow z_{\\alpha/2} = 2$<br>No conocemos $p$, asi que usamos $p = q = 0{,}5$ (peor caso).<br><br><strong>Paso 2 - Formula:</strong><br>$n = \\left(\\frac{z_{\\alpha/2}}{E}\\right)^2 \\cdot p \\cdot q = \\left(\\frac{2}{0{,}03}\\right)^2 \\times 0{,}25 = 4444{,}4 \\times 0{,}25 = 1111{,}1$<br><br><strong>n = 1112</strong> (siempre redondeamos hacia ARRIBA).<br><br><strong>Regla:</strong> Si no te dan $p$, usa $p = q = 0{,}5$."
        },
        {
            question: "Te dan un IC = (1076,08; 1083,92) con $\\sigma=20$, $n=100$. ¿Cual es la media muestral y el nivel de confianza?",
            answer: "<strong>Paso 1 - Media:</strong> Es el punto medio del intervalo:<br>$\\bar{x} = \\frac{1076{,}08 + 1083{,}92}{2} = 1080$<br><br><strong>Paso 2 - Error:</strong><br>$E = 1083{,}92 - 1080 = 3{,}92$<br><br><strong>Paso 3 - Despejar z:</strong><br>$E = z_{\\alpha/2} \\cdot \\frac{\\sigma}{\\sqrt{n}} \\Rightarrow 3{,}92 = z_{\\alpha/2} \\cdot \\frac{20}{\\sqrt{100}} = z_{\\alpha/2} \\cdot 2$<br>$z_{\\alpha/2} = 1{,}96$<br><br><strong>Paso 4:</strong> $P(Z \\leq 1{,}96) = 0{,}975 \\Rightarrow \\alpha/2 = 0{,}025 \\Rightarrow \\alpha = 0{,}05$<br><strong>Nivel de confianza = 95%</strong>"
        }
    ]
};

const temaTheoryLinks = {
    1: 'tema1.html',
    2: 'tema2.html',
    3: 'tema3.html'
};

const temaNames = {
    1: 'Probabilidad',
    2: 'Binomial',
    3: 'Normal e IC'
};

let currentTema = 1;
let currentQ = 0;
let revealed = false;
let shuffledQuestions = {};

function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
}

var QUESTIONS_PER_TEST = 6;

function getQuestions() {
    if (!shuffledQuestions[currentTema]) {
        shuffledQuestions[currentTema] = shuffle(questions[currentTema]).slice(0, QUESTIONS_PER_TEST);
    }
    return shuffledQuestions[currentTema];
}

function renderMath() {
    if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetClear([
            document.getElementById('q-text'),
            document.getElementById('q-answer')
        ]);
        MathJax.typesetPromise([
            document.getElementById('q-text'),
            document.getElementById('q-answer')
        ]).catch(function(err) { console.warn('MathJax:', err); });
    }
}

function loadQuestion() {
    var qs = getQuestions();
    var q = qs[currentQ];

    document.getElementById('q-number').textContent = 'Pregunta ' + (currentQ + 1);
    document.getElementById('q-text').innerHTML = q.question;
    document.getElementById('q-answer').innerHTML = q.answer;
    document.getElementById('q-answer').classList.remove('visible');

    var btn = document.getElementById('reveal-btn');
    btn.textContent = 'Mostrar respuesta';
    btn.classList.remove('open');
    revealed = false;

    updateProgress();
    updateNav();
    updateTheoryLink();
    renderMath();
}

function updateProgress() {
    var total = getQuestions().length;
    document.getElementById('progress-text').textContent = 'Pregunta ' + (currentQ + 1) + ' / ' + total;
    document.getElementById('progress-fill').style.width = ((currentQ + 1) / total * 100) + '%';
}

function updateNav() {
    var total = getQuestions().length;
    document.getElementById('prev-btn').disabled = currentQ === 0;

    var nextBtn = document.getElementById('next-btn');
    nextBtn.disabled = false;
    nextBtn.textContent = currentQ === total - 1 ? 'Finalizar \u2192' : 'Siguiente \u2192';
}

function updateTheoryLink() {
    document.getElementById('theory-link').href = temaTheoryLinks[currentTema];
    document.getElementById('theory-link').textContent = 'Repasar ' + temaNames[currentTema] + ' \u2192';
    document.getElementById('done-theory').href = temaTheoryLinks[currentTema];
}

function toggleAnswer() {
    revealed = !revealed;
    var ans = document.getElementById('q-answer');
    var btn = document.getElementById('reveal-btn');

    if (revealed) {
        ans.classList.add('visible');
        btn.textContent = 'Ocultar respuesta';
        btn.classList.add('open');
        renderMath();
    } else {
        ans.classList.remove('visible');
        btn.textContent = 'Mostrar respuesta';
        btn.classList.remove('open');
    }
}

function nextQuestion() {
    var total = getQuestions().length;
    if (currentQ === total - 1) {
        showDone();
    } else {
        currentQ++;
        loadQuestion();
    }
}

function prevQuestion() {
    if (currentQ > 0) {
        currentQ--;
        loadQuestion();
    }
}

function showDone() {
    var total = getQuestions().length;
    document.getElementById('quiz-content').style.display = 'none';
    document.getElementById('q-nav').style.display = 'none';
    document.querySelector('.quiz-progress').style.display = 'none';
    document.getElementById('done-screen').classList.add('visible');
    document.getElementById('done-score').textContent = total + '/' + total + ' preguntas';
}

function switchTema(tema) {
    currentTema = parseInt(tema);
    currentQ = 0;
    revealed = false;
    shuffledQuestions[currentTema] = shuffle(questions[currentTema]);

    document.getElementById('quiz-content').style.display = 'block';
    document.getElementById('q-nav').style.display = 'flex';
    document.querySelector('.quiz-progress').style.display = 'flex';
    document.getElementById('done-screen').classList.remove('visible');

    document.querySelectorAll('.tema-tab').forEach(function(btn) {
        btn.classList.remove('active');
    });
    document.querySelector('[data-tema="' + tema + '"]').classList.add('active');

    loadQuestion();
}

// Tab click handlers
document.querySelectorAll('.tema-tab').forEach(function(button) {
    button.addEventListener('click', function() {
        switchTema(this.dataset.tema);
    });
});

// Deep linking: read ?tema= from URL
var params = new URLSearchParams(window.location.search);
var temaParam = params.get('tema');
if (temaParam && questions[parseInt(temaParam)]) {
    currentTema = parseInt(temaParam);
}

// Initialize
switchTema(currentTema);
</script>
