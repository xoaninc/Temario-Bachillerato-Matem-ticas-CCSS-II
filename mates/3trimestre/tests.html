let currentTema = 6;
let currentIndex = 0;
let quizQuestions = [];

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function loadQuiz(tema) {
    currentTema = tema;
    currentIndex = 0;
    quizQuestions = shuffle([...questions[tema]]).slice(0, QUESTIONS_PER_QUIZ);
    document.getElementById('done-screen').classList.remove('visible');
    document.getElementById('quiz-content').style.display = 'block';
    document.getElementById('q-nav').style.display = 'flex';
    document.getElementById('theory-link').href = theoryLinks[tema];
    document.getElementById('done-theory').href = theoryLinks[tema];
    document.querySelectorAll('.tema-tab').forEach(function(t) {
        t.classList.toggle('active', parseInt(t.dataset.tema) === tema);
    });
    showQuestion();
}

function showQuestion() {
    var q = quizQuestions[currentIndex];
    document.getElementById('q-number').textContent = 'Pregunta ' + (currentIndex + 1);
    document.getElementById('q-text').innerHTML = q.question;
    document.getElementById('q-answer').innerHTML = q.answer;
    document.getElementById('q-answer').classList.remove('visible');
    var btn = document.getElementById('reveal-btn');
    btn.textContent = 'Mostrar respuesta';
    btn.classList.remove('open');
    document.getElementById('progress-text').textContent = 'Pregunta ' + (currentIndex + 1) + ' / ' + quizQuestions.length;
    document.getElementById('progress-fill').style.width = ((currentIndex + 1) / quizQuestions.length * 100) + '%';
    document.getElementById('prev-btn').disabled = currentIndex === 0;
    document.getElementById('next-btn').textContent = currentIndex === quizQuestions.length - 1 ? 'Finalizar' : 'Siguiente \u2192';
    if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise();
}

function toggleAnswer() {
    var ans = document.getElementById('q-answer');
    var btn = document.getElementById('reveal-btn');
    ans.classList.toggle('visible');
    btn.classList.toggle('open');
    btn.textContent = ans.classList.contains('visible') ? 'Ocultar respuesta' : 'Mostrar respuesta';
    if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise();
}

function nextQuestion() {
    if (currentIndex < quizQuestions.length - 1) { currentIndex++; showQuestion(); }
    else {
        document.getElementById('quiz-content').style.display = 'none';
        document.getElementById('q-nav').style.display = 'none';
        document.getElementById('done-score').textContent = quizQuestions.length + '/' + quizQuestions.length + ' repasadas';
        document.getElementById('done-screen').classList.add('visible');
    }
}

function prevQuestion() { if (currentIndex > 0) { currentIndex--; showQuestion(); } }

document.querySelectorAll('.tema-tab').forEach(function(tab) {
    tab.addEventListener('click', function() { loadQuiz(parseInt(this.dataset.tema)); });
});

// Init from URL param or default
var params = new URLSearchParams(window.location.search);
var startTema = parseInt(params.get('tema')) || 6;
loadQuiz(startTema);
</script>
